<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Projets - Semestre 1</title>

<style>

/* STYLE DES PROJETS */

.projects-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.project-card{
background:linear-gradient(145deg,#0b1d3a,#151a3a);
border-radius:16px;
padding:25px;
border:1px solid rgba(255,255,255,0.05);
transition:0.3s;
color:white;
}

.project-card:hover{
transform:translateY(-6px);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

body{
background:#070b1a;
font-family:Arial;
color:white;
padding:80px;
}

</style>

</head>

<body>

<h1>Projets - Semestre 1</h1>

<div class="projects-grid">

  <!-- Projet 1 -->
  <div class="project-card">
    <h3>Site Vitrine 🖥️</h3>
    <p>Projet réalisé en SLAM</p>
    <ul>
      <li>Conception HTML</li>
      <li>CSS et animations</li>
      <li>JavaScript</li>
    </ul>
  </div>

  <!-- Projet 2 -->
  <div class="project-card">
    <h3>Appel d'offre PC 💻</h3>
    <p>Projet réalisé en SISR</p>
    <ul>
      <li>Analyse des besoins</li>
      <li>Rédaction cahier des charges</li>
    </ul>
  </div>

</div>

</body>
</html>
